<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockAI RAG</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
        }

        header { margin-bottom: 32px; }
        header h1 { font-size: 28px; color: #00e5ff; letter-spacing: 1px; }
        header p { color: #888; margin-top: 8px; font-size: 14px; }

        .card {
            background: #1a1d27;
            border: 1px solid #2a2d3e;
            border-radius: 10px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 16px;
        }

        .stock-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .stock-search-wrap { position: relative; }

        .stock-search-wrap label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
        }

        input[type="text"], textarea {
            width: 100%;
            background: #0f1117;
            border: 1px solid #2a2d3e;
            border-radius: 6px;
            color: #e0e0e0;
            padding: 10px 14px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: #00e5ff;
        }

        input[type="text"]:disabled, textarea:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1a1d27;
            border: 1px solid #2a2d3e;
            border-radius: 6px;
            margin-top: 4px;
            z-index: 100;
            display: none;
            max-height: 200px;
            overflow-y: auto;
        }

        .dropdown-item {
            padding: 10px 14px;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid #2a2d3e;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .dropdown-item:last-child { border-bottom: none; }

        .dropdown-item:hover { background: #252836; }

        .dropdown-item .ticker { color: #00e5ff; font-weight: bold; font-size: 12px; }
        .dropdown-item .name { color: #ccc; }

        .selected-stock {
            margin-top: 8px;
            font-size: 12px;
            color: #00e5ff;
            min-height: 18px;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-primary { background: #00e5ff; color: #0f1117; }
        .btn-primary:hover:not(:disabled) { opacity: 0.85; }

        .btn-secondary { background: #2a2d3e; color: #e0e0e0; }
        .btn-secondary:hover:not(:disabled) { background: #353849; }

        .fetch-row {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        #fetch-status {
            font-size: 13px;
            color: #888;
        }

        #fetch-status.success { color: #00e57a; }
        #fetch-status.error { color: #ff5252; }

        .qa-section { opacity: 0.4; pointer-events: none; transition: opacity 0.3s; }
        .qa-section.unlocked { opacity: 1; pointer-events: all; }

        textarea {
            height: 90px;
            resize: vertical;
            font-family: inherit;
        }

        .qa-controls {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 12px;
        }

        .debug-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #888;
            cursor: pointer;
        }

        input[type="checkbox"] { accent-color: #00e5ff; cursor: pointer; }

        .answer-history { display: flex; flex-direction: column; gap: 16px; }

        .qa-pair { border-left: 3px solid #00e5ff; padding-left: 16px; }

        .qa-pair .question {
            font-size: 13px;
            color: #888;
            margin-bottom: 8px;
        }

        .qa-pair .answer {
            font-size: 14px;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .debug-panel {
            margin-top: 12px;
            background: #0f1117;
            border: 1px solid #2a2d3e;
            border-radius: 6px;
            padding: 12px;
            font-family: monospace;
            font-size: 12px;
            color: #00e57a;
            white-space: pre-wrap;
            display: none;
        }

        .loader {
            display: none;
            font-size: 13px;
            color: #888;
        }

        .divider {
            border: none;
            border-top: 1px solid #2a2d3e;
            margin: 20px 0;
        }
    </style>
</head>
<body>
<div class="container">

    <header>
        <h1>⚡ StockAI RAG</h1>
        <p>AI-powered stock research assistant. Select two stocks, ask anything — comparisons, fundamentals, news, trends.</p>
    </header>

    <!-- Step 1: Stock Selection -->
    <div class="card" id="fetch-card">
        <h2>Step 1 — Select Stocks</h2>
        <div class="stock-row">

            <div class="stock-search-wrap">
                <label>Stock 1</label>
                <input type="text" id="stock1-input" placeholder="Type to search e.g. Reliance..." autocomplete="off" />
                <div class="dropdown" id="stock1-dropdown"></div>
                <div class="selected-stock" id="stock1-selected"></div>
            </div>

            <div class="stock-search-wrap">
                <label>Stock 2</label>
                <input type="text" id="stock2-input" placeholder="Type to search e.g. TCS..." autocomplete="off" />
                <div class="dropdown" id="stock2-dropdown"></div>
                <div class="selected-stock" id="stock2-selected"></div>
            </div>

            <div class="stock-search-wrap">
                <label>Stock 3</label>
                <input type="text" id="stock3-input" placeholder="Type to search e.g. Infosys..." autocomplete="off" />
                <div class="dropdown" id="stock3-dropdown"></div>
                <div class="selected-stock" id="stock3-selected"></div>
            </div>

        </div>

        <div class="fetch-row">
            <button class="btn btn-primary" id="fetch-btn" onclick="fetchStockData()">Fetch Data</button>
            <div id="fetch-loader" class="loader">⏳ Fetching and indexing data...</div>
            <div id="fetch-status"></div>
        </div>
    </div>

    <!-- Step 2: Q&A -->
    <div class="card qa-section" id="qa-card">
        <h2>Step 2 — Ask Questions</h2>

        <!-- Answer history builds here -->
        <div class="answer-history" id="answer-history"></div>

        <hr class="divider" id="qa-divider" style="display:none">

        <!-- Question input always at bottom -->
        <textarea id="question" placeholder="e.g. Compare TCS and Reliance on revenue growth. Is either a good buy right now?"></textarea>

        <div class="qa-controls">
            <button class="btn btn-primary" id="answer-btn" onclick="askQuestion()">Answer</button>
            <div id="answer-loader" class="loader">⏳ Thinking...</div>
            <label class="debug-toggle">
                <input type="checkbox" id="debug-mode" /> Debug mode
            </label>
        </div>

        <div class="debug-panel" id="debug-panel"></div>
    </div>

</div>
<script>
    // ─── State ───────────────────────────────────────────────────────
    let selectedSymbol1 = null;
    let selectedSymbol2 = null;
    let selectedSymbol3 = null;

    // ─── Typeahead ───────────────────────────────────────────────────
    function setupTypeahead(inputId, dropdownId, onSelect) {
        const input = document.getElementById(inputId);
        const dropdown = document.getElementById(dropdownId);
        let debounceTimer = null;

        input.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            const query = input.value.trim();
            if (query.length < 3) { dropdown.style.display = 'none'; return; }
            debounceTimer = setTimeout(() => searchStocks(query, dropdown, input, onSelect), 300);
        });

        document.addEventListener('click', (e) => {
            if (!input.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.style.display = 'none';
            }
        });
    }

    async function searchStocks(query, dropdown, input, onSelect) {
        // TODO Day 4: replace with real Yahoo Finance search API call
        // For now — show a placeholder so wiring is testable
        const mockResults = [
            { symbol: 'RELIANCE.NS', name: 'Reliance Industries Ltd' },
            { symbol: 'TCS.NS', name: 'Tata Consultancy Services' },
            { symbol: 'INFY.NS', name: 'Infosys Ltd' },
            { symbol: 'HDFCBANK.NS', name: 'HDFC Bank Ltd' },
            { symbol: 'WIPRO.NS', name: 'Wipro Ltd' },
        ].filter(s =>
            s.name.toLowerCase().includes(query.toLowerCase()) ||
            s.symbol.toLowerCase().includes(query.toLowerCase())
        );

        renderDropdown(mockResults, dropdown, input, onSelect);
    }

    function renderDropdown(results, dropdown, input, onSelect) {
        if (results.length === 0) { dropdown.style.display = 'none'; return; }
        dropdown.innerHTML = results.map(r => `
            <div class="dropdown-item" onclick='selectStock(${JSON.stringify(r)}, arguments[0])'>
                <span class="ticker">${r.symbol}</span>
                <span class="name">${r.name}</span>
            </div>
        `).join('');
        dropdown.style.display = 'block';
        dropdown._onSelect = onSelect;
        dropdown._input = input;
    }

    function selectStock(result, event) {
        const dropdown = event.target.closest('.dropdown');
        dropdown._input.value = result.name;
        dropdown.style.display = 'none';
        dropdown._onSelect(result.symbol, result.name);
    }

    // ─── Init typeaheads ─────────────────────────────────────────────
    setupTypeahead('stock1-input', 'stock1-dropdown', (symbol, name) => {
        selectedSymbol1 = symbol;
        document.getElementById('stock1-selected').textContent = '✓ ' + symbol;
    });

    setupTypeahead('stock2-input', 'stock2-dropdown', (symbol, name) => {
        selectedSymbol2 = symbol;
        document.getElementById('stock2-selected').textContent = '✓ ' + symbol;
    });

    setupTypeahead('stock3-input', 'stock3-dropdown', (symbol, name) => {
        selectedSymbol3 = symbol;
        document.getElementById('stock3-selected').textContent = '✓ ' + symbol;
    });

    // ─── Helper: append Q&A pair to history ──────────────────────────
    function appendAnswer(question, answer, debugInfo) {
        const history = document.getElementById('answer-history');
        document.getElementById('qa-divider').style.display = 'block';

        const pair = document.createElement('div');
        pair.className = 'qa-pair';
        pair.innerHTML = `
            <div class="question">Q: ${question}</div>
            <div class="answer">${answer}</div>
            ${debugInfo ? `<div class="debug-panel" style="display:block">${debugInfo}</div>` : ''}
        `;
        history.appendChild(pair);
        pair.scrollIntoView({ behavior: 'smooth' });
    }

    // ─── Fetch Stock Data ─────────────────────────────────────────────
    // YOUR TASK: wire this to POST /load
    async function fetchStockData()
        {
            alert(selectedSymbol1);
            alert(selectedSymbol2);
            alert(selectedSymbol3);
            document.getElementById('fetch-loader').style.display = 'block'
            fetch('http://localhost:8000/load', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
                , body: JSON.stringify({
                    'sym1': selectedSymbol1,
                    'sym2': selectedSymbol2,
                    'sym3': selectedSymbol3
                })
            })
            .then(response => {
                return response.json();
            })
            .then(data => {
                document.getElementById('fetch-loader').style.display = 'none';
                document.getElementById('qa-card').classList.add('unlocked');
                document.getElementById('fetch-btn').disabled = true;
                // document.getElementById('output').innerHTML = '<pre>'+JSON.stringify(data, null, 4)+'</pre>';

            })
        }

    // ─── Ask Question ─────────────────────────────────────────────────
    // YOUR TASK: wire this to POST /ask
    async function askQuestion() {
        // your JS goes here
    }


</script>
</body>
</html>
